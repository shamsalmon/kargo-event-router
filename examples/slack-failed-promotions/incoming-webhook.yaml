# Post a Slack message via an incoming webhook whenever any Promotion in the
# kargo-demo Project fails.
#
# Prerequisite: create an incoming webhook for your Slack workspace
# (https://api.slack.com/messaging/webhooks) and paste its URL below. The
# webhook is bound to a specific channel when you create it.
apiVersion: v1
kind: Secret
metadata:
  name: devops-team-slack-secret
  namespace: kargo-demo
stringData:
  webhook-url: https://hooks.slack.com/services/T00000000/B00000000/XXXXXXXXXXXXXXXXXXXXXXXX
---
apiVersion: kargo-event-router.io/v1alpha1
kind: MessageChannel
metadata:
  name: devops-team-slack
  namespace: kargo-demo
spec:
  slack:
    secretRef:
      name: devops-team-slack-secret
---
apiVersion: kargo-event-router.io/v1alpha1
kind: EventRouter
metadata:
  name: failed-promotions
  namespace: kargo-demo
spec:
  types:
  - PromotionFailed
  - PromotionErrored
  channels:
  - name: devops-team-slack
    kind: MessageChannel
