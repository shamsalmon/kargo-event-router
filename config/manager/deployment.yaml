apiVersion: v1
kind: Namespace
metadata:
  name: kargo-event-router
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kargo-event-router
  namespace: kargo-event-router
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kargo-event-router
  namespace: kargo-event-router
  labels:
    app.kubernetes.io/name: kargo-event-router
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: kargo-event-router
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kargo-event-router
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
    spec:
      serviceAccountName: kargo-event-router
      containers:
      - name: kargo-event-router
        image: ghcr.io/shamsalmon/kargo-event-router:latest
        env:
        - name: MAX_EVENT_AGE
          value: 30m
        - name: SEND_TIMEOUT
          value: 10s
        ports:
        - name: metrics
          containerPort: 8080
        - name: health
          containerPort: 8081
        livenessProbe:
          httpGet:
            path: /healthz
            port: health
        readinessProbe:
          httpGet:
            path: /readyz
            port: health
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 65534
          capabilities:
            drop:
            - ALL
